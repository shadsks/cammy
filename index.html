<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shoebox - instant camera</title>
<meta name="theme-color" content="#1c1916">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Space+Grotesk:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=lab8">
<link rel="stylesheet" href="shoebox-lab.css?v=lab8">
</head>
<body class="bg-cork demo">

  <!-- the desk / photo wall -->
  <div id="wall" aria-label="Photo wall"></div>
  <div class="wall-shade" aria-hidden="true"></div>
  <div class="wall-grain" aria-hidden="true"></div>
  <div id="flashBeam" class="flash-beam" aria-hidden="true"></div>

  <header class="brand">
    <h1>SHOEBOX</h1>
    <p>instant camera</p>
  </header>

  <nav class="topbar">
    <button id="btnDarkroom" type="button">Darkroom</button>
    <button id="btnStudio" type="button">Studio</button>
    <button id="btnSheet" type="button">Sheet</button>
    <button id="btnClear" type="button">Clear</button>
    <button id="btnSound" type="button" aria-pressed="true">Sound: on</button>
  </nav>

  <aside id="darkroom" class="panel" hidden>
    <h2>Darkroom</h2>

    <section>
      <h3>Film stock</h3>
      <div class="stocks" id="stocks"></div>
    </section>

    <section>
      <h3>Effects</h3>
      <div class="sliders">
        <label>Grain        <input type="range" id="fxGrain"    min="0" max="100" value="28"><output>28</output></label>
        <label>Vignette     <input type="range" id="fxVignette" min="0" max="100" value="34"><output>34</output></label>
        <label>Light leak   <input type="range" id="fxLeak"     min="0" max="100" value="22"><output>22</output></label>
        <label>Dust         <input type="range" id="fxDust"     min="0" max="100" value="12"><output>12</output></label>
      </div>
    </section>

    <section>
      <h3>Strip layout</h3>
      <div class="seg" id="stripSeg">
        <button type="button" data-layout="strip" class="on">1 x 4</button>
        <button type="button" data-layout="grid">2 x 2</button>
      </div>
    </section>

    <section>
      <h3>Frame</h3>
      <div class="swatches" id="frames"></div>
    </section>

    <section>
      <h3>Surface</h3>
      <div class="swatches" id="surfaces"></div>
    </section>

    <section id="deskSec" hidden>
      <h3>Desk</h3>
      <button id="tiltBtn" class="wide" type="button">Tilt drift: off</button>
      <button id="ambientBtn" class="wide" type="button" hidden>Room light: off</button>
    </section>
  </aside>

  <aside id="studio" class="panel" hidden>
    <h2>Studio</h2>
    <div class="studio-list">
      <button id="stWall" type="button"><strong>Save the wall</strong><span>one PNG of the whole desk</span></button>
      <button id="stFold" type="button"><strong>Fold preview</strong><span>latest 8 photos as a booklet</span></button>
      <button id="stZine" type="button"><strong>Mini zine</strong><span>foldable PDF, latest 8 photos</span></button>
      <button id="stPoster" type="button"><strong>Poster</strong><span>print-size PNG, latest 12 photos</span></button>
    </div>
  </aside>

  <!-- the camera -->
  <div id="camera" data-lens="normal">
    <div id="ejector"></div>
    <div class="cam-shell">
      <div class="cam-top">
        <div class="slot"></div>
      </div>
      <div class="cam-face">
        <div class="vf-ring">
          <span class="lens-tag" id="lensTag">STD 40</span>
          <div class="lens-barrel">
          <div class="viewfinder" id="viewfinder">
            <video id="vfVideo" autoplay playsinline muted hidden></video>
            <canvas id="vfDemo" width="720" height="720"></canvas>
            <canvas id="vfFx" width="240" height="240" hidden></canvas>
            <img id="vfGhost" alt="" hidden>
            <div class="vf-tint" aria-hidden="true"></div>
            <div class="vf-leak" aria-hidden="true"></div>
            <div class="vf-vignette" aria-hidden="true"></div>
            <div class="vf-shader" aria-hidden="true"></div>
            <div class="vf-grain" aria-hidden="true"></div>
            <div class="vf-glass" aria-hidden="true"></div>
            <div class="vf-prog" id="vfProg" hidden></div>
            <div class="vf-rec" id="vfRec" hidden><span>REC</span></div>
            <div class="vf-rail" id="vfRail" hidden></div>
            <div class="vf-motion" id="vfMotion" hidden>
              <span id="motionN">0</span>
              <button id="motionDone" type="button">DEVELOP</button>
            </div>
            <div class="vf-count" id="vfCount" hidden></div>
          </div>
          </div>
        </div>
        <div class="cam-right">
          <div class="rainbow" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <div class="shutter-ring">
            <button id="shutter" class="shutter" type="button" aria-label="Take photo. Hold to record a voice note"><span></span></button>
          </div>
        </div>
      </div>
      <div class="popover" id="popover" hidden></div>
      <div class="cam-controls">
        <button class="ctl" id="ctlMode"  type="button">MODE<b>SINGLE</b></button>
        <button class="ctl" id="ctlLens"  type="button">LENS<b>STD</b></button>
        <button class="ctl" id="ctlExpo"  type="button">EXPO<b>1X</b></button>
        <button class="ctl" id="ctlTimer" type="button">TIMER<b>OFF</b></button>
        <button class="ctl" id="ctlZoom"  type="button">ZOOM<b>1x</b></button>
        <button class="ctl" id="ctlFlip"  type="button">FLIP<b>CAM</b></button>
        <button class="ctl" id="ctlSrc"   type="button">FEED<b>DEMO</b></button>
        <button class="ctl" id="ctlScene" type="button">SCENE<b>DUSK</b></button>
      </div>
      <div class="cam-grip"></div>
    </div>
  </div>

  <div id="sheet" class="sheet" hidden>
    <div class="sheet-bar">
      <h2>Contact sheet</h2>
      <div class="sheet-filters" id="sheetFilters"></div>
      <button id="sheetClose" class="sheet-x" type="button" aria-label="Close contact sheet">✕</button>
    </div>
    <div class="sheet-grid" id="sheetGrid"></div>
    <div class="sheet-foot">
      <span id="sheetCount">tap photos to select</span>
      <div class="sheet-actions">
        <button id="sheetZine" type="button">Zine from selection</button>
        <button id="sheetPoster" type="button">Poster from selection</button>
      </div>
    </div>
  </div>

  <div id="lightbox" hidden><span>LIGHTBOX</span></div>

  <div id="zineFold" class="zine-fold" hidden aria-hidden="true">
    <div class="zine-book" id="zineBook">
      <i></i><i></i><i></i><i></i>
      <i></i><i></i><i></i><i></i>
    </div>
  </div>

  <div id="flash" aria-hidden="true"></div>
  <div id="toast" role="status"></div>

  <script src="gif.js?v=lab8"></script>
  <script src="mp4.js?v=lab8"></script>
  <script src="app.js?v=lab8"></script>
</body>
</html>
